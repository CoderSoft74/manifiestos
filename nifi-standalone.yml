---
# ============================================
# PERSISTENT VOLUMES (PVs)
# ============================================
apiVersion: v1
kind: PersistentVolume
metadata:
  name: nifi-conf-pv
  namespace: services-databases
spec:
  capacity:
    storage: 1Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: local-path
  local:
    path: /drix/2026/nifi/nifi-current/conf
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - kube03
