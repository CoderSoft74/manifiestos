---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka-1
  namespace: confluent
  labels:
    app: kafka-1
    tech: kafka
spec:
  serviceName: kafka-1
  replicas: 1
  selector:
    matchLabels:
      app: kafka-1
  template:
    metadata:
      labels:
        app: kafka-1
        tech: kafka
    spec:
      nodeSelector:
        kubernetes.io/hostname: kube01
      containers:
        - name: kafka-1
          image: confluentinc/cp-kafka:6.0.1
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          lifecycle:
            postStart:
              exec:
                command: ["/bin/sh", "-c", "rm -f /var/lib/kafka/data/meta.properties"]
          env:
            - name: KAFKA_BROKER_ID
              value: "1"
            - name: KAFKA_ZOOKEEPER_CONNECT
              value: "zk-1.confluent.svc.cluster.local:2181/kafka"
            - name: KAFKA_ADVERTISED_LISTENERS
              value: "PLAINTEXT://kafka-1.confluent.svc.cluster.local:9092"
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_AUTO_CREATE_TOPICS_ENABLE
              value: "true"
            - name: KAFKA_LOG_SEGMENT_BYTES
              value: "1073741824"
            - name: KAFKA_HOST_NAME
              value: "kafka-1"
            - name: KAFKA_ADVERTISED_HOST_NAME
              value: "kafka-1"
            - name: TZ
              value: "America/Hvana"
            - name: KAFKA_HEAP_OPTS
              value: "-Xmx1G -Xms512M"
            - name: KAFKA_LOG_DIRS
              value: "/var/lib/kafka/data"
          volumeMounts:
            - name: kafka-data
              mountPath: /var/lib/kafka/data
            - name: kafka-log
              mountPath: /var/log/kafka
            - name: kafka-tmp
              mountPath: /tmp
      volumes:
        - name: kafka-tmp
          hostPath:
            path: /home/confluentic/kafka/node1/tmp
  volumeClaimTemplates:
    - metadata:
        name: kafka-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 20Gi
        storageClassName: "local-path"
    - metadata:
        name: kafka-log
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
        storageClassName: "local-path"
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-1
  namespace: confluent
spec:
  selector:
    app: kafka-1
  clusterIP: None
  ports:
    - name: kafka-port
      protocol: TCP
      port: 9092
---
# PersistentVolumes para Kafka
apiVersion: v1
kind: PersistentVolume
metadata:
  name: pv-kafka-data-1
spec:
  capacity:
    storage: 20Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: local-path
  local:
    path: /home/confluentic/kafka/data
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - kube01
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: pv-kafka-log-1
spec:
  capacity:
    storage: 10Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: local-path
  local:
    path: /home/confluentic/kafka/logs
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - kube01
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: pv-kafka-tmp-1
spec:
  capacity:
    storage: 5Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: local-path
  local:
    path: /home/confluentic/kafka/tmp
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - kube01
