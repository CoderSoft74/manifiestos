---
apiVersion: v1
kind: Namespace
metadata:
  name: microservices
---
apiVersion: v1
kind: Secret
metadata:
  name: postgresql-secret
  namespace: microservices
type: Opaque
stringData:
  POSTGRES_PASSWORD: "12keycloak12"
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: postgresql-keycloak-pv
  namespace: microservices
  labels:
    type: local
spec:
  capacity:
    storage: 5Gi
  volumeMode: Filesystem
  accessModes:
  - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: manual
  local:
    path: /drix/collective/uaa/postgre3
  nodeAffinity:
    required:
      nodeSelectorTerms:
      - matchExpressions:
        - key: kubernetes.io/hostname
          operator: In
          values:
          - "kube05"
---
apiVersion: v1
kind: Service
metadata:
  name: postgresql-keycloak-svc
  namespace: microservices
  labels:
    app: postgresql-keycloak
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app: postgresql-keycloak
  ports:
  - name: postgres
    port: 5432
    targetPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: postgresql-keycloak-nodeport
  namespace: microservices
  labels:
    app: postgresql-keycloak
spec:
  type: NodePort
  selector:
    app: postgresql-keycloak
  ports:
  - name: postgres
    port: 5432
    targetPort: 5432
    nodePort: 30065
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgresql-keycloak
  namespace: microservices
  labels:
    app: postgresql-keycloak
    service: uaa
spec:
  serviceName: postgresql-keycloak-svc
  replicas: 1
  selector:
    matchLabels:
      app: postgresql-keycloak
  template:
    metadata:
      labels:
        app: postgresql-keycloak
        service: uaa
    spec:
      nodeSelector:
        kubernetes.io/hostname: "kube05"
      
      containers:
      - name: postgresql
        image: 172.24.7.124:5000/plataforma/it/postgre:10
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5432
          name: postgres
        env:
        - name: POSTGRES_DB
          value: "keycloak"
        - name: POSTGRES_USER
          value: "keycloak"
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgresql-secret
              key: POSTGRES_PASSWORD
        - name: DB_EXTENSION
          value: "pg_trgm"
        
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "500m"
            memory: "1Gi"
        
        volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql/data
        
        # 🟢 CORREGIDO: livenessProbe usando exec con psql
        livenessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - "psql -U keycloak -d keycloak -c 'SELECT 1'"
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        
        # 🟢 CORREGIDO: readinessProbe usando exec con psql
        readinessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - "psql -U keycloak -d keycloak -c 'SELECT 1'"
          initialDelaySeconds: 15
          periodSeconds: 15
          timeoutSeconds: 5
          failureThreshold: 3
  
  volumeClaimTemplates:
  - metadata:
      name: postgres-data
    spec:
      accessModes:
        - ReadWriteOnce
      storageClassName: manual
      resources:
        requests:
          storage: 5Gi