apiVersion: v1
kind: Namespace
metadata:
  name: services-databases
---
apiVersion: v1
kind: Secret
metadata:
  name: neo4j-secret
  namespace: services-databases
type: Opaque
stringData:
  NEO4J_AUTH: "neo4j/admin"
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: neo4j
  namespace: services-databases
  labels:
    app: neo4j
    service: databases
spec:
  serviceName: neo4j-svc
  replicas: 1
  selector:
    matchLabels:
      app: neo4j
  template:
    metadata:
      labels:
        app: neo4j
        service: databases
    spec:
      # ⚡ NUEVO: nodeSelector para fijar el nodo específico
      nodeSelector:
        kubernetes.io/hostname: "kube02"
      
      # ⚡ NUEVO: Toleraciones si el nodo tiene taints específicos
      # tolerations:
      # - key: "dedicated"
      #   operator: "Equal"
      #   value: "databases"
      #   effect: "NoSchedule"
      
      affinity:
        # ⚡ MODIFICADO: Cambiado para asegurar que el pod se ejecute en el nodo específico
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: kubernetes.io/hostname
                operator: In
                values:
                - "kube02"
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - neo4j
              topologyKey: kubernetes.io/hostname
      containers:
      - name: neo4j
        image: neo4j:4.2.19-enterprise
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 7474
          name: http
        - containerPort: 7687
          name: bolt
        - containerPort: 2024
          name: metrics
        env:
        - name: NEO4J_apoc_ttl_enabled
          value: "true"
        - name: NEO4J_metrics_prometheus_endpoint
          value: "0.0.0.0:2024"
        - name: NEO4J_AUTH
          valueFrom:
            secretKeyRef:
              name: neo4j-secret
              key: NEO4J_AUTH
        - name: NEO4J_apoc_trigger_enabled
          value: "true"
        - name: NEO4J_apoc_import_file_enabled
          value: "true"
        - name: NEO4J_dbms_memory_pagecache_size
          value: "1000M"
        - name: NEO4J_ACCEPT_LICENSE_AGREEMENT
          value: "yes"
        - name: NEO4J_dbms_security_procedures_unrestricted
          value: "apoc.*, gds.*"
        - name: NEO4J_dbms_memory_heap_initial__size
          value: "1000M"
        - name: NEO4J_metrics_prometheus_enabled
          value: "true"
        - name: NEO4J_dbms_security_procedures_allowlist
          value: "apoc.*, gds*"
        - name: NEO4J_dbms_memory_heap_max__size
          value: "3000M"
        - name: NEO4J_dbms_jvm_additional
          value: "-XX:+ExitOnOutOfMemoryError -XX:+UseG1GC -XX:MaxGCPauseMillis=200 -XX:+UseStringDeduplication"
        - name: NEO4J_dbms_mode
          value: "SINGLE"
        resources:
          requests:
            cpu: "1000m"
            memory: "4Gi"
          limits:
            cpu: "2000m"
            memory: "6Gi"
        volumeMounts:
        - name: neo4j-data
          mountPath: /data
        - name: neo4j-plugins
          mountPath: /var/lib/neo4j/plugins
        livenessProbe:
          tcpSocket:
            port: 7474
          initialDelaySeconds: 60
          periodSeconds: 60
          timeoutSeconds: 30
          failureThreshold: 3
        readinessProbe:
          tcpSocket:
            port: 7474
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 10
  volumeClaimTemplates:
  - metadata:
      name: neo4j-data
    spec:
      accessModes:
        - ReadWriteOnce
      storageClassName: longhorn
      resources:
        requests:
          storage: 20Gi
  - metadata:
      name: neo4j-plugins
    spec:
      accessModes:
        - ReadWriteOnce
      storageClassName: longhorn
      resources:
        requests:
          storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: neo4j-svc
  namespace: services-databases
  labels:
    app: neo4j
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app: neo4j
  ports:
  - name: http
    port: 7474
    targetPort: 7474
  - name: bolt
    port: 7687
    targetPort: 7687
---
apiVersion: v1
kind: Service
metadata:
  name: neo4j-loadbalancer
  namespace: services-databases
  labels:
    app: neo4j
spec:
  type: LoadBalancer
  selector:
    app: neo4j
  ports:
  - name: http
    port: 7474
    targetPort: 7474
  - name: bolt
    port: 7687
    targetPort: 7687
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: neo4j-ingress
  namespace: services-databases
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  rules:
  # ⚡ MODIFICADO: Actualizado el host para usar la nueva IP
  - host: neo4j.kube02.nip.io
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: neo4j-loadbalancer
            port:
              number: 7474
